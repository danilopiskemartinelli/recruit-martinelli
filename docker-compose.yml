version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hr_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: hr_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hr_user}:${POSTGRES_PASSWORD:-hr_secret}@postgres:5432/${POSTGRES_DB:-hr_platform}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-hr_user}:${POSTGRES_PASSWORD:-hr_secret}@postgres:5432/${POSTGRES_DB:-hr_platform}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: hr_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hr_user}:${POSTGRES_PASSWORD:-hr_secret}@postgres:5432/${POSTGRES_DB:-hr_platform}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps/api:/app
      - api_uploads:/app/uploads
    depends_on:
      - redis
      - postgres
    command: celery -A app.worker worker --loglevel=info

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: hr_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hr_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  api_uploads:
